<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>像素大战</title>
<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
}

canvas {
    background: #111;
    display: block;
    margin: 20px auto;
    border: 2px solid white;
}
</style>
</head>
<body>

<h2>像素大战</h2>
<p>A/D移动 空格攻击</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
    x: 100,
    y: 300,
    w: 40,
    h: 40,
    color: "cyan"
};

let enemy = {
    x: 600,
    y: 300,
    w: 40,
    h: 40,
    color: "red",
    hp: 3
};

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function update() {
    if (keys["a"]) player.x -= 5;
    if (keys["d"]) player.x += 5;

    // 攻击
    if (keys[" "]) {
        if (Math.abs(player.x - enemy.x) < 50) {
            enemy.hp -= 0.1;
        }
    }

    // 敌人简单AI
    if (enemy.x > player.x) enemy.x -= 1;
    else enemy.x += 1;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 玩家
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // 敌人
    ctx.fillStyle = enemy.color;
    ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);

    // 血量
    ctx.fillStyle = "white";
    ctx.fillText("敌人HP: " + Math.floor(enemy.hp), 10, 20);

    if (enemy.hp <= 0) {
        ctx.fillText("你赢了！🎉", 350, 200);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
