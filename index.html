<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>像素大战 Pro</title>
<style>
body {
    margin:0;
    background:black;
    color:white;
    text-align:center;
}
canvas {
    background:#111;
    border:2px solid white;
}
button {
    margin:5px;
    padding:10px;
}
</style>
</head>
<body>

<h2>🔥 像素大战 PRO</h2>

<input id="name" placeholder="输入名字">
<button onclick="startGame()">开始</button>

<canvas id="game" width="800" height="400"></canvas>

<div id="mobile">
    <button onclick="move('left')">⬅</button>
    <button onclick="move('right')">➡</button>
    <button onclick="attack()">⚔</button>
</div>

<h3>🏆 排行榜</h3>
<ul id="rank"></ul>

<script>
const ctx = document.getElementById("game").getContext("2d");

let player, boss;
let score = 0;
let name = "";

let moveDir = "";

function startGame(){
    name = document.getElementById("name").value || "玩家";

    player = {x:100,y:300,hp:100};
    boss = {x:600,y:200,hp:20};

    score = 0;
    gameLoop();
}

// 手机控制
function move(dir){
    moveDir = dir;
}
function attack(){
    boss.hp--;
    playSound();
}

// 音效
function playSound(){
    let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    audio.play();
}

function update(){
    if(moveDir==="left") player.x -= 5;
    if(moveDir==="right") player.x += 5;

    if(boss.x > player.x) boss.x -= 1;
    else boss.x += 1;

    if(Math.random()<0.02){
        player.hp -= 2;
    }

    if(boss.hp<=0){
        saveScore();
    }
}

function draw(){
    ctx.clearRect(0,0,800,400);

    ctx.fillStyle="cyan";
    ctx.fillRect(player.x,300,30,30);

    ctx.fillStyle="red";
    ctx.fillRect(boss.x,200,50,50);

    ctx.fillStyle="white";
    ctx.fillText("HP:"+player.hp,10,20);
}

function gameLoop(){
    update();
    draw();

    if(player.hp>0 && boss.hp>0){
        requestAnimationFrame(gameLoop);
    }
}

// 排行榜（本地）
function saveScore(){
    let list = JSON.parse(localStorage.getItem("rank")||"[]");
    list.push({name,score:Date.now()});
    localStorage.setItem("rank",JSON.stringify(list));
    showRank();
}

function showRank(){
    let list = JSON.parse(localStorage.getItem("rank")||"[]");
    let ul = document.getElementById("rank");
    ul.innerHTML="";
    list.slice(-5).forEach(i=>{
        let li=document.createElement("li");
        li.innerText=i.name+" - "+i.score;
        ul.appendChild(li);
    });
}

showRank();
</script>

</body>
</html>
