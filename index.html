<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>像素大战 Final</title>
<style>
body {
    margin:0;
    background:black;
    color:white;
    text-align:center;
    font-family:sans-serif;
}
canvas {
    background:#111;
    border:2px solid white;
}
button {
    padding:10px 20px;
    font-size:16px;
    margin:10px;
}
</style>
</head>
<body>

<h1>🔥 像素大战 FINAL</h1>

<div id="menu">
    <button onclick="startGame()">开始游戏</button>
</div>

<canvas id="game" width="800" height="400"></canvas>

<div id="end" style="display:none;">
    <h2 id="result"></h2>
    <button onclick="startGame()">重新开始</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let state = "menu";

let player, boss, bullets, enemyBullets;
let keys = {};
let skillCD = 0;

function reset() {
    player = { x:100, y:300, w:30, h:30, hp:100 };
    boss = { x:600, y:200, w:60, h:60, hp:30 };
    bullets = [];
    enemyBullets = [];
    skillCD = 0;
}

function startGame() {
    reset();
    state = "game";
    document.getElementById("menu").style.display="none";
    document.getElementById("end").style.display="none";
}

document.addEventListener("keydown", e=>{
    keys[e.key]=true;

    if(state!=="game") return;

    if(e.code==="Space"){
        bullets.push({x:player.x+15,y:player.y});
    }

    if(e.key==="j" && skillCD<=0){
        for(let i=-2;i<=2;i++){
            bullets.push({x:player.x+15+i*10,y:player.y});
        }
        skillCD=60;
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key]=false;
});

function update(){
    if(state!=="game") return;

    if(keys["a"]) player.x-=5;
    if(keys["d"]) player.x+=5;

    bullets.forEach(b=>b.y-=6);

    if(boss.x>player.x) boss.x-=1.5;
    else boss.x+=1.5;

    if(Math.random()<0.03){
        enemyBullets.push({x:boss.x+30,y:boss.y+50});
    }

    if(Math.random()<0.01){
        for(let i=0;i<8;i++){
            enemyBullets.push({
                x:boss.x+30,
                y:boss.y+30,
                vx:Math.cos(i)*3,
                vy:Math.sin(i)*3
            });
        }
    }

    enemyBullets.forEach(b=>{
        b.y+=b.vy||3;
        b.x+=b.vx||0;
    });

    bullets.forEach((b,i)=>{
        if(b.x>boss.x && b.x<boss.x+boss.w &&
           b.y>boss.y && b.y<boss.y+boss.h){
            boss.hp--;
            bullets.splice(i,1);
        }
    });

    enemyBullets.forEach((b,i)=>{
        if(b.x>player.x && b.x<player.x+player.w &&
           b.y>player.y && b.y<player.y+player.h){
            player.hp-=5;
            enemyBullets.splice(i,1);
        }
    });

    skillCD--;

    if(player.hp<=0){
        state="lose";
        showEnd("💀 你输了！");
    }

    if(boss.hp<=0){
        state="win";
        showEnd("🎉 你赢了！");
    }
}

function showEnd(text){
    document.getElementById("end").style.display="block";
    document.getElementById("result").innerText=text;
}

function drawBar(x,y,hp,max,color){
    ctx.fillStyle="gray";
    ctx.fillRect(x,y,100,10);
    ctx.fillStyle=color;
    ctx.fillRect(x,y,(hp/max)*100,10);
}

function draw(){
    ctx.clearRect(0,0,800,400);

    if(state!=="game") return;

    ctx.fillStyle="cyan";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    ctx.fillStyle="purple";
    ctx.fillRect(boss.x,boss.y,boss.w,boss.h);

    ctx.fillStyle="yellow";
    bullets.forEach(b=>ctx.fillRect(b.x,b.y,5,10));

    ctx.fillStyle="orange";
    enemyBullets.forEach(b=>ctx.fillRect(b.x,b.y,5,10));

    drawBar(10,10,player.hp,100,"cyan");
    drawBar(600,10,boss.hp,30,"purple");

    ctx.fillText("技能CD:"+Math.max(0,skillCD),10,40);
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
