<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>像素大战 V5</title>
<style>
body {
    background:black;
    color:white;
    text-align:center;
}
canvas {
    background:#111;
    border:2px solid white;
}
</style>
</head>
<body>

<h1>🔥 像素大战 V5（BOSS进化）</h1>
<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:100,y:300,w:30,h:30,hp:100};
let boss = {x:600,y:200,w:60,h:60,hp:30,phase:1};

let bullets = [];
let enemyBullets = [];

let keys = {};
let skillCD = 0;

let hitFlash = 0;
let bossHit = 0;

document.addEventListener("keydown", e=>{
    keys[e.key]=true;

    if(e.code==="Space"){
        bullets.push({x:player.x+15,y:player.y});
    }

    if(e.key==="j" && skillCD<=0){
        for(let i=-3;i<=3;i++){
            bullets.push({x:player.x+15+i*8,y:player.y});
        }
        skillCD=50;
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key]=false;
});

function update(){

    // 玩家移动
    if(keys["a"]) player.x-=5;
    if(keys["d"]) player.x+=5;

    bullets.forEach(b=>b.y-=6);

    // BOSS进入二阶段
    if(boss.hp <= 15) boss.phase = 2;

    // 移动（狂暴更快）
    let speed = boss.phase===1 ? 1.5 : 3;
    if(boss.x > player.x) boss.x -= speed;
    else boss.x += speed;

    // 攻击
    let fireRate = boss.phase===1 ? 0.03 : 0.07;

    if(Math.random()<fireRate){
        enemyBullets.push({x:boss.x+30,y:boss.y+50});
    }

    // 二阶段散射
    if(boss.phase===2 && Math.random()<0.05){
        for(let i=0;i<10;i++){
            enemyBullets.push({
                x:boss.x+30,
                y:boss.y+30,
                vx:Math.cos(i)*3,
                vy:Math.sin(i)*3
            });
        }
    }

    enemyBullets.forEach(b=>{
        b.y += b.vy || 3;
        b.x += b.vx || 0;
    });

    // 命中检测
    bullets.forEach((b,i)=>{
        if(b.x>boss.x && b.x<boss.x+boss.w &&
           b.y>boss.y && b.y<boss.y+boss.h){
            boss.hp--;
            bullets.splice(i,1);

            hitFlash = 5;
            bossHit = 5;
        }
    });

    enemyBullets.forEach((b,i)=>{
        if(b.x>player.x && b.x<player.x+player.w &&
           b.y>player.y && b.y<player.y+player.h){
            player.hp -= 5;
            enemyBullets.splice(i,1);
        }
    });

    skillCD--;

    if(player.hp<=0 || boss.hp<=0){
        cancelAnimationFrame(loopId);
    }
}

function drawBar(x,y,hp,max,color){
    ctx.fillStyle="gray";
    ctx.fillRect(x,y,100,10);
    ctx.fillStyle=color;
    ctx.fillRect(x,y,(hp/max)*100,10);
}

function draw(){
    ctx.clearRect(0,0,800,400);

    // 闪屏
    if(hitFlash>0){
        ctx.fillStyle="white";
        ctx.globalAlpha=0.3;
        ctx.fillRect(0,0,800,400);
        ctx.globalAlpha=1;
        hitFlash--;
    }

    // 玩家
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    // BOSS（受击变色）
    ctx.fillStyle = bossHit>0 ? "white" : (boss.phase===2 ? "red" : "purple");
    ctx.fillRect(boss.x,boss.y,boss.w,boss.h);
    bossHit--;

    // 子弹
    ctx.fillStyle="yellow";
    bullets.forEach(b=>ctx.fillRect(b.x,b.y,5,10));

    ctx.fillStyle="orange";
    enemyBullets.forEach(b=>ctx.fillRect(b.x,b.y,5,10));

    // UI
    drawBar(10,10,player.hp,100,"cyan");
    drawBar(600,10,boss.hp,30,"purple");

    ctx.fillText("技能CD:"+Math.max(0,skillCD),10,40);

    if(boss.phase===2){
        ctx.fillStyle="red";
        ctx.fillText("⚠ BOSS狂暴！",350,50);
    }

    if(player.hp<=0){
        ctx.fillText("💀 你输了",350,200);
    }
    if(boss.hp<=0){
        ctx.fillText("🎉 胜利！",350,200);
    }
}

let loopId;
function loop(){
    update();
    draw();
    loopId = requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
