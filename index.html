<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>像素大战 v2</title>
<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
}

canvas {
    background: #111;
    display: block;
    margin: 20px auto;
    border: 2px solid white;
}
</style>
</head>
<body>

<h2>🔥 像素大战 v2</h2>
<p>A/D移动 空格攻击</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
    x: 100,
    y: 300,
    w: 40,
    h: 40,
    color: "cyan",
    hp: 5
};

let enemy = {
    x: 600,
    y: 300,
    w: 40,
    h: 40,
    color: "red",
    hp: 5
};

let effects = [];

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function attack(attacker, target) {
    if (Math.abs(attacker.x - target.x) < 60) {
        target.hp -= 1;

        // 打击特效
        effects.push({
            x: target.x + 20,
            y: target.y,
            life: 10
        });
    }
}

function update() {
    if (keys["a"]) player.x -= 5;
    if (keys["d"]) player.x += 5;

    if (keys[" "]) attack(player, enemy);

    // 敌人AI
    if (enemy.x > player.x) enemy.x -= 2;
    else enemy.x += 2;

    if (Math.random() < 0.02) {
        attack(enemy, player);
    }

    // 更新特效
    effects.forEach(e => e.life--);
    effects = effects.filter(e => e.life > 0);
}

function drawBar(x, y, hp, color) {
    ctx.fillStyle = "gray";
    ctx.fillRect(x, y, 50, 5);

    ctx.fillStyle = color;
    ctx.fillRect(x, y, hp * 10, 5);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 玩家
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // 敌人
    ctx.fillStyle = enemy.color;
    ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);

    // 血条
    drawBar(player.x, player.y - 10, player.hp, "cyan");
    drawBar(enemy.x, enemy.y - 10, enemy.hp, "red");

    // 特效
    effects.forEach(e => {
        ctx.fillStyle = "yellow";
        ctx.fillRect(e.x, e.y, 10, 10);
    });

    // 胜负
    if (enemy.hp <= 0) {
        ctx.fillText("🎉 你赢了！", 350, 200);
    }

    if (player.hp <= 0) {
        ctx.fillText("💀 你输了！", 350, 200);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
