<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>角色选择 PRO</title>
<style>
body { background:black; color:white; text-align:center; font-family:sans-serif; }
canvas { background:#111; border:2px solid white; }

/* 🎴 角色卡片 */
.card {
    display:inline-block;
    margin:20px;
    padding:10px;
    border:2px solid white;
    cursor:pointer;
    width:120px;
}
.card:hover {
    background:#222;
}
.card img {
    width:80px;
}
</style>
</head>
<body>

<h1>⚔️ 角色选择 PRO</h1>

<div id="menu">
    <button onclick="goSelect()">开始游戏</button>
</div>

<div id="select" style="display:none;">
    <h2>选择你的角色</h2>

    <div class="card" onclick="choose('warrior')">
        <img src="https://i.imgur.com/GEXD7bk.png">
        <p>🛡 战士</p>
    </div>

    <div class="card" onclick="choose('assassin')">
        <img src="https://i.imgur.com/6X12K8F.png">
        <p>⚡ 刺客</p>
    </div>

    <div class="card" onclick="choose('tank')">
        <img src="https://i.imgur.com/8Qf6F0G.png">
        <p>🧱 坦克</p>
    </div>

</div>

<canvas id="game" width="800" height="400"></canvas>

<div id="end" style="display:none;">
    <h2 id="result"></h2>
    <button onclick="restart()">重新开始</button>
</div>

<script>
const ctx = document.getElementById("game").getContext("2d");

let state="menu";
let player, enemy, playerImg;

function goSelect(){
    state="select";
    document.getElementById("menu").style.display="none";
    document.getElementById("select").style.display="block";
}

// 🎮 角色选择
function choose(type){

    if(type==="warrior"){
        player = {x:100,y:250,hp:120,damage:10};
        playerImg = "https://i.imgur.com/GEXD7bk.png";
    }

    if(type==="assassin"){
        player = {x:100,y:250,hp:80,damage:20};
        playerImg = "https://i.imgur.com/6X12K8F.png";
    }

    if(type==="tank"){
        player = {x:100,y:250,hp:160,damage:8};
        playerImg = "https://i.imgur.com/8Qf6F0G.png";
    }

    enemy = {x:600,y:250,hp:100};

    player.img = new Image();
    player.img.src = playerImg;

    enemy.img = new Image();
    enemy.img.src = "https://i.imgur.com/GEXD7bk.png";

    state="game";
    document.getElementById("select").style.display="none";
}

function restart(){
    location.reload();
}

let keys={};

document.addEventListener("keydown", e=>{
    keys[e.key]=true;

    if(state==="game" && e.key==="j"){
        if(Math.abs(player.x - enemy.x)<60){
            enemy.hp -= player.damage;
        }
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key]=false;
});

function update(){
    if(state!=="game") return;

    if(keys["a"]) player.x-=3;
    if(keys["d"]) player.x+=3;

    if(enemy.x>player.x) enemy.x-=1;
    else enemy.x+=1;

    if(Math.abs(enemy.x-player.x)<50){
        player.hp -= 0.3;
    }

    if(player.hp<=0){
        endGame("💀 你输了");
    }
    if(enemy.hp<=0){
        endGame("🎉 你赢了");
    }
}

function endGame(text){
    state="end";
    document.getElementById("end").style.display="block";
    document.getElementById("result").innerText=text;
}

function drawBar(x,y,hp,color){
    ctx.fillStyle="gray";
    ctx.fillRect(x,y,120,10);
    ctx.fillStyle=color;
    ctx.fillRect(x,y,hp,10);
}

function draw(){

    ctx.clearRect(0,0,800,400);

    if(state!=="game") return;

    // 玩家（图片）
    ctx.drawImage(player.img, player.x, player.y, 60, 60);

    // 敌人
    ctx.drawImage(enemy.img, enemy.x, enemy.y, 60, 60);

    drawBar(10,10,player.hp,"cyan");
    drawBar(600,10,enemy.hp,"red");
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
