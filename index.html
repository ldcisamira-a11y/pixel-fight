<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>角色大战 V5</title>
<style>
body{
    background:black;
    color:white;
    text-align:center;
    font-family:sans-serif;
}
canvas{
    background:#111;
    border:2px solid white;
}
</style>
</head>

<body>

<h1>⚔️ 角色大战</h1>
<p>A / D 移动，J 攻击</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:100,y:260,hp:120};
let enemy = {x:600,y:260,hp:100};

let keys = {};

// 🎨 创建“角色图片”（关键！！不用外链）
function createCharacter(color){
    let c = document.createElement("canvas");
    c.width = 40;
    c.height = 60;
    let g = c.getContext("2d");

    // 身体
    g.fillStyle = color;
    g.fillRect(10,20,20,30);

    // 头
    g.fillStyle = "#ffe0bd";
    g.fillRect(12,5,16,15);

    // 眼睛
    g.fillStyle = "black";
    g.fillRect(15,10,2,2);
    g.fillRect(23,10,2,2);

    return c;
}

// ✅ 真“人物图像”
let playerImg = createCharacter("#00ffff");
let enemyImg = createCharacter("#ff0000");

document.addEventListener("keydown", e=>{
    keys[e.key]=true;

    if(e.key==="j"){
        if(Math.abs(player.x - enemy.x)<60){
            enemy.hp -= 10;
        }
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key]=false;
});

function update(){

    if(keys["a"]) player.x -= 3;
    if(keys["d"]) player.x += 3;

    // 敌人追踪
    if(enemy.x > player.x) enemy.x -= 1;
    else enemy.x += 1;

    // 攻击
    if(Math.abs(enemy.x - player.x) < 50){
        player.hp -= 0.3;
    }
}

function drawBar(x,y,hp,color){
    ctx.fillStyle="gray";
    ctx.fillRect(x,y,120,10);

    ctx.fillStyle=color;
    ctx.fillRect(x,y,hp,10);
}

function draw(){

    ctx.clearRect(0,0,800,400);

    // 画人物（不是方块了！）
    ctx.drawImage(playerImg, player.x, player.y);
    ctx.drawImage(enemyImg, enemy.x, enemy.y);

    drawBar(10,10,player.hp,"cyan");
    drawBar(650,10,enemy.hp,"red");

    if(player.hp<=0){
        ctx.fillStyle="red";
        ctx.font="30px sans-serif";
        ctx.fillText("💀 你输了",330,200);
    }

    if(enemy.hp<=0){
        ctx.fillStyle="yellow";
        ctx.font="30px sans-serif";
        ctx.fillText("🎉 你赢了",330,200);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
