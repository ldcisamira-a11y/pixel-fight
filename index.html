<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>像素大战 Ultimate</title>
<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
}

canvas {
    background: #111;
    display: block;
    margin: 20px auto;
    border: 2px solid white;
}

button {
    padding: 10px 20px;
    font-size: 16px;
}
</style>
</head>
<body>

<h2>🔥 像素大战 Ultimate</h2>
<p>A/D移动 W跳跃 空格攻击 J发波</p>

<button onclick="startGame()">开始游戏</button>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameRunning = false;

let player, enemy, bullets, keys;

function resetGame() {
    player = {
        x: 100,
        y: 300,
        w: 40,
        h: 40,
        vx: 0,
        vy: 0,
        onGround: true,
        hp: 5
    };

    enemy = {
        x: 600,
        y: 300,
        w: 40,
        h: 40,
        hp: 5
    };

    bullets = [];
    keys = {};
}

function startGame() {
    resetGame();
    gameRunning = true;
}

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function shoot() {
    bullets.push({
        x: player.x + 40,
        y: player.y + 20,
        vx: 6
    });
}

let shootCooldown = 0;

function update() {
    if (!gameRunning) return;

    // 移动
    if (keys["a"]) player.x -= 5;
    if (keys["d"]) player.x += 5;

    // 跳跃
    if (keys["w"] && player.onGround) {
        player.vy = -10;
        player.onGround = false;
    }

    // 重力
    player.vy += 0.5;
    player.y += player.vy;

    if (player.y >= 300) {
        player.y = 300;
        player.vy = 0;
        player.onGround = true;
    }

    // 攻击
    if (keys[" "] && Math.abs(player.x - enemy.x) < 60) {
        enemy.hp -= 0.1;
    }

    // 发波
    if (keys["j"] && shootCooldown <= 0) {
        shoot();
        shootCooldown = 20;
    }

    shootCooldown--;

    // 子弹移动
    bullets.forEach(b => {
        b.x += b.vx;

        if (Math.abs(b.x - enemy.x) < 20) {
            enemy.hp -= 1;
            b.hit = true;
        }
    });

    bullets = bullets.filter(b => !b.hit && b.x < 800);

    // 敌人AI
    if (enemy.x > player.x) enemy.x -= 2;
    else enemy.x += 2;

    if (Math.random() < 0.02) {
        if (Math.abs(enemy.x - player.x) < 60) {
            player.hp -= 1;
        }
    }
}

function drawBar(x, y, hp, color) {
    ctx.fillStyle = "gray";
    ctx.fillRect(x, y, 50, 5);

    ctx.fillStyle = color;
    ctx.fillRect(x, y, hp * 10, 5);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameRunning) {
        ctx.fillText("点击上方按钮开始游戏", 300, 200);
        return;
    }

    // 玩家
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // 敌人
    ctx.fillStyle = "red";
    ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);

    // 子弹
    ctx.fillStyle = "yellow";
    bullets.forEach(b => {
        ctx.fillRect(b.x, b.y, 10, 5);
    });

    // 血条
    drawBar(player.x, player.y - 10, player.hp, "cyan");
    drawBar(enemy.x, enemy.y - 10, enemy.hp, "red");

    // 胜负
    if (enemy.hp <= 0) {
        ctx.fillText("🎉 你赢了！", 350, 200);
        gameRunning = false;
    }

    if (player.hp <= 0) {
        ctx.fillText("💀 你输了！", 350, 200);
        gameRunning = false;
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
