<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>战斗系统 V8 - BOSS战</title>
<style>
body{background:black;color:white;text-align:center}
canvas{background:#111;border:2px solid white}
</style>
</head>

<body>

<h1>👾 BOSS战 V8</h1>
<p>A/D移动 | J攻击 | K冲刺 | 躲避子弹！</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
    x:100,y:260,hp:120,
    attack:false,
    dashCD:0
};

let boss = {
    x:600,y:200,hp:300,
    shootCD:0
};

let bullets = [];
let keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key]=true;

    // 攻击
    if(e.key==="j"){
        if(Math.abs(player.x - boss.x)<80){
            boss.hp -= 10;
        }
    }

    // 冲刺
    if(e.key==="k" && player.dashCD<=0){
        player.x += (player.x<boss.x?1:-1)*100;
        player.dashCD=100;
    }
});

document.addEventListener("keyup", e=>keys[e.key]=false);

function drawPlayer(){
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x,player.y,20,30);

    ctx.fillStyle="#ffe0bd";
    ctx.fillRect(player.x+2,player.y-10,16,15);
}

function drawBoss(){
    ctx.fillStyle="purple";
    ctx.fillRect(boss.x,boss.y,40,40);
}

function drawBullets(){
    bullets.forEach((b,i)=>{
        ctx.fillStyle="orange";
        ctx.fillRect(b.x,b.y,8,8);

        b.x += b.vx;
        b.y += b.vy;

        // 碰撞
        if(Math.abs(b.x-player.x)<20 && Math.abs(b.y-player.y)<20){
            player.hp -= 5;
            bullets.splice(i,1);
        }
    });
}

function drawBar(x,y,hp,color){
    ctx.fillStyle="gray";
    ctx.fillRect(x,y,150,10);

    ctx.fillStyle=color;
    ctx.fillRect(x,y,hp,10);
}

function update(){

    if(keys["a"]) player.x-=3;
    if(keys["d"]) player.x+=3;

    if(player.dashCD>0) player.dashCD--;

    // BOSS射击
    if(boss.shootCD<=0){

        for(let i=0;i<5;i++){
            bullets.push({
                x:boss.x+20,
                y:boss.y+20,
                vx:(Math.random()-0.5)*4,
                vy:(Math.random()-0.5)*4
            });
        }

        boss.shootCD=60;
    }else{
        boss.shootCD--;
    }
}

function draw(){

    ctx.clearRect(0,0,800,400);

    drawPlayer();
    drawBoss();
    drawBullets();

    drawBar(10,10,player.hp,"cyan");
    drawBar(600,10,boss.hp,"purple");

    if(player.hp<=0){
        ctx.fillStyle="red";
        ctx.font="30px sans-serif";
        ctx.fillText("💀 你被击败",300,200);
    }

    if(boss.hp<=0){
        ctx.fillStyle="yellow";
        ctx.font="30px sans-serif";
        ctx.fillText("🏆 击败BOSS！",280,200);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
